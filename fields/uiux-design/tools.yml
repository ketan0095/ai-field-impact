# --- Design & Prototyping ---

- name: "Figma AI"
  url: "https://figma.com"
  category: "design-prototyping"
  what_it_does: "AI-powered design generation (First Draft), auto-layout, content filling, design suggestions, layer renaming, and visual search within Figma"
  replaces: "Manual component arrangement, placeholder content, responsive layout creation, layer organization"
  adoption: "widespread"
  pricing: "included"
  added: "2026-04-01"
  last_verified: "2026-04-02"
  notes: "First Draft (text-to-UI), AI rename layers, visual search launched 2024-2025. 2026 Figma survey: 82% of design leaders say demand for designers increased or stayed same."

