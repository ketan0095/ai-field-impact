# AI Tools for UIUX Design
# Categories: design-prototyping, research-testing, content-assets, design-to-code

# --- Design & Prototyping ---

- name: "Figma AI"
  url: "https://figma.com"
  category: "design-prototyping"
  what_it_does: "Auto-layout generation, content filling, design suggestions, and component recommendations within Figma"
  replaces: "Manual component arrangement, placeholder content, responsive layout creation"
  adoption: "widespread"
  pricing: "included"
  added: "2026-04-01"
  last_verified: "2026-04-01"

- name: "Galileo AI"
  url: "https://usegalileo.ai"
  category: "design-prototyping"
  what_it_does: "Generates high-fidelity UI designs from text descriptions"
  replaces: "Early-stage wireframing, mood boards, initial concept exploration"
  adoption: "growing"
  pricing: "freemium"
  added: "2026-04-01"
  last_verified: "2026-04-01"

- name: "Uizard"
  url: "https://uizard.io"
  category: "design-prototyping"
  what_it_does: "Converts hand-drawn sketches and screenshots into editable wireframes"
  replaces: "Manual wireframe recreation from sketches or competitor screenshots"
  adoption: "growing"
  pricing: "freemium"
  added: "2026-04-01"
  last_verified: "2026-04-01"

- name: "Relume"
  url: "https://relume.io"
  category: "design-prototyping"
  what_it_does: "AI-generated sitemaps and wireframes from a project brief"
  replaces: "Information architecture grunt work, initial sitemap creation"
  adoption: "growing"
  pricing: "paid"
  added: "2026-04-01"
  last_verified: "2026-04-01"

# --- Research & Testing ---

- name: "Attention Insight"
  url: "https://attentioninsight.com"
  category: "research-testing"
  what_it_does: "AI-predicted attention heatmaps for designs without user testing"
  replaces: "Some preliminary usability testing rounds, early design validation"
  adoption: "emerging"
  pricing: "paid"
  added: "2026-04-01"
  last_verified: "2026-04-01"

- name: "Maze AI"
  url: "https://maze.co"
  category: "research-testing"
  what_it_does: "Auto-generates research reports and insights from usability test data"
  replaces: "Manual test analysis, report writing, data synthesis"
  adoption: "growing"
  pricing: "freemium"
  added: "2026-04-01"
  last_verified: "2026-04-01"

- name: "Notably"
  url: "https://notably.ai"
  category: "research-testing"
  what_it_does: "Auto-tags and clusters qualitative research data from interviews and surveys"
  replaces: "Manual affinity mapping, thematic analysis of interview transcripts"
  adoption: "emerging"
  pricing: "paid"
  added: "2026-04-01"
  last_verified: "2026-04-01"

- name: "Synthetic Users"
  url: "https://syntheticusers.com"
  category: "research-testing"
  what_it_does: "AI-simulated user interviews for rapid hypothesis testing"
  replaces: "Early-stage assumption testing only (NOT a replacement for real user research)"
  adoption: "experimental"
  pricing: "paid"
  added: "2026-04-01"
  last_verified: "2026-04-01"
  notes: "Useful for generating hypotheses, dangerous if mistaken for real research"

