# AI Tools for Software Engineering
# Add new tools by copying the template entry below.
# Keep entries sorted alphabetically within each category.
#
# Required fields: name, url, category, what_it_does, adoption, pricing, added, last_verified
# Optional fields: replaces, notes

# Categories for this field (customize per field):
#   - code-generation
#   - code-review
#   - debugging
#   - testing
#   - documentation
#   - devops-infra
#   - project-management

- name: "Example Tool"
  url: "https://example.com"
  category: "code-generation"
  what_it_does: "One-line description of what this tool does"
  replaces: "What manual work this replaces or reduces"
  adoption: "experimental"   # experimental | emerging | growing | widespread
  pricing: "freemium"        # free | freemium | paid | enterprise
  added: "2026-04-02"
  last_verified: "2026-04-02"
  notes: "Optional additional context"
